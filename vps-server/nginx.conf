# ============================================================================
# MovieAce High-Performance Nginx Configuration
# 
# Architecture:
#   Browser → Nginx (this server) → Node.js Resolver API (port 8080)
#                                  → CDN Streams (with header rewriting)
#
# Key Optimizations:
#   • Zero-buffer video streaming via sendfile() and proxy_buffering off
#   • Kernel-level TCP socket pooling with keepalive connections
#   • Dynamic Referer/Origin injection to bypass CDN hotlink protection
#   • HTTP Range request support for instant seeking
#   • CORS headers added once at Nginx layer
# ============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log;
pid /var/run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── Basic Settings ──────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ── Gzip Compression (disabled for video) ───────────────────────────────
    gzip off;

    # ── Upstream Pools ──────────────────────────────────────────────────────
    upstream node_resolver {
        server 127.0.0.1:8080;
        keepalive 32;
    }

    # ── Rate Limiting ───────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=stream:10m rate=120r/m;

    # ========================================================================
    # Main Server Block
    # ========================================================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name 161.118.191.46;

        # Maximum upload size
        client_max_body_size 10M;

        # ====================================================================
        # Health Check
        # ====================================================================
        location = /health {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Content-Type' 'text/plain';
            return 200 'MovieAce VPS Proxy - OK';
        }

        # ====================================================================
        # Node.js Resolver API Proxy
        # Routes: /vps-proxy/search, /vps-proxy/resolve, /vps-proxy/subtitle
        # ====================================================================
        location /vps-proxy/ {
            limit_req zone=api burst=10 nodelay;

            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

            # Handle preflight
            if ($request_method = 'OPTIONS') {
                return 204;
            }

            # Proxy to Node.js resolver
            proxy_pass http://node_resolver;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ====================================================================
        # High-Performance Video Stream Proxy
        # Format: /proxy-media/<protocol>/<cdn-domain>/<path>
        # Example: /proxy-media/https/hakunaymatata.com/cdn/video.mp4
        # ====================================================================
        location ~* ^/proxy-media/(https?):/(.*)$ {
            limit_req zone=stream burst=30 nodelay;

            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Range, Content-Type, Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range, Accept-Ranges' always;

            # Handle preflight
            if ($request_method = 'OPTIONS') {
                return 204;
            }

            # Reconstruct target URL
            resolver 8.8.8.8 valid=300s;
            resolver_timeout 5s;

            set $target_protocol $1;
            set $target_path $2;
            set $target_url "$target_protocol://$target_path";

            # Append query string if present
            if ($is_args) {
                set $target_url "$target_url$is_args$args";
            }

            # ── Critical: Disable ALL buffering for zero-lag streaming ──
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_http_version 1.1;

            # ── Inject trusted headers to bypass CDN hotlink protection ──
            proxy_set_header Referer "https://moviebox.pk";
            proxy_set_header Origin "https://moviebox.pk";
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";

            # ── Forward Range headers for instant seeking ──
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;

            # ── Remove headers that could leak proxy identity ──
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Real-IP "";

            # ── Hide duplicate headers from upstream CDN ──
            proxy_hide_header 'Access-Control-Allow-Origin';

            # ── Timeouts optimized for large video files ──
            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # ── Stream directly from CDN ──
            proxy_pass $target_url;

            # ── Error handling ──
            proxy_intercept_errors off;
        }

        # ====================================================================
        # Legacy Catch-All (Backward Compatibility)
        # Format: /<protocol>://<domain>/<path>
        # ====================================================================
        location / {
            # Only process if path starts with http
            if ($request_uri !~* "^/(https?://.+)$") {
                return 404;
            }

            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Range, Content-Type, Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            resolver 8.8.8.8 valid=300s;
            resolver_timeout 5s;

            # Extract URL from path
            set $target_url '';
            if ($request_uri ~* "^/(https?://.+)$") {
                set $target_url $1;
            }

            # Zero-buffer streaming
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_http_version 1.1;

            # Inject headers
            proxy_set_header Referer "https://moviebox.pk";
            proxy_set_header Origin "https://moviebox.pk";
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;

            # ── Hide duplicate headers from upstream CDN ──
            proxy_hide_header 'Access-Control-Allow-Origin';

            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;

            proxy_pass $target_url;
        }

        # ====================================================================
        # Error Pages
        # ====================================================================
        error_page 404 /404.html;
        location = /404.html {
            internal;
            add_header 'Content-Type' 'text/plain';
            return 404 'Not Found';
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            internal;
            add_header 'Content-Type' 'text/plain';
            return 500 'Server Error';
        }
    }
}
