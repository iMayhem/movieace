# ============================================================================
# proxy.moovie.fun — Nginx Configuration
# 
# Architecture:
#   Browser → Nginx (this server) → CDN / aoneroom.com API
#
# Key optimisations vs the old Node.js proxy:
#   • Nginx handles all I/O in C — no Node.js event loop overhead
#   • m3u8 playlists are rewritten on-the-fly so segment URLs point here
#   • Segments are streamed directly from CDN through Nginx with correct
#     Referer injected — browser never needs to know the real CDN URL
#   • CORS headers added once at the Nginx layer
#   • Keepalive upstream connections reuse TCP sockets
# ============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;
pid /run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── Mime types ──────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Performance ─────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               off;   # Never gzip video/binary content

    # ── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $request_uri [$status] '
                    '$body_bytes_sent bytes ref="$http_referer"';
    access_log /var/log/nginx/proxy_access.log main;
    error_log  /var/log/nginx/proxy_error.log warn;

    # ── Upstream keepalive pools ─────────────────────────────────────────────
    upstream aoneroom_api {
        server h5.aoneroom.com:443;
        keepalive 32;
    }

    # ── Rate limiting — prevent abuse ────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=stream:10m rate=120r/m;

    # ========================================================================
    # Main proxy server (HTTP only for now - add SSL later)
    # ========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name proxy.moovie.fun 161.118.191.46;

        # CORS will be added in each location block

        # ── Health check ───────────────────────────────────────────────────
        location = /health {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header Content-Type text/plain;
            return 200 'ok';
        }

        # ====================================================================
        # /api/* — Proxy aoneroom.com API calls (search, play, download)
        # These are small JSON responses — rate limited, fast path
        # ====================================================================
        location /api/ {
            limit_req zone=api burst=10 nodelay;

            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Range, Content-Type, Authorization' always;

            # Handle preflight
            if ($request_method = 'OPTIONS') {
                return 204;
            }

            # Strip the /api/ prefix, forward to aoneroom
            rewrite ^/api/(.*)$ /$1 break;

            proxy_pass         https://h5.aoneroom.com;
            proxy_ssl_server_name on;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host h5.aoneroom.com;

            # Inject the trusted Referer — critical for hasResource: true
            proxy_set_header   Referer "https://h5.aoneroom.com";
            proxy_set_header   Origin  "https://h5.aoneroom.com";

            # Strip client headers that could leak our proxy
            proxy_set_header   X-Forwarded-For "";
            proxy_set_header   X-Real-IP "";

            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ====================================================================
        # /stream/* — HLS/DASH stream proxy
        # 
        # URL format:  /stream/<encoded-cdn-url>
        # Example:     /stream/https%3A%2F%2Fcdn.aoneroom.com%2Fhls%2Fabc%2Fmaster.m3u8
        #
        # For m3u8 playlists: rewrite segment URLs to go through this proxy
        # For .ts/.mp4 segments: pass through directly with correct Referer
        # ====================================================================
        location /stream/ {
            limit_req zone=stream burst=30 nodelay;

            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Range, Content-Type, Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

            # Handle preflight
            if ($request_method = 'OPTIONS') {
                return 204;
            }

            # Decode the target URL from the path
            set $target_url $arg_url;

            # ── m3u8 playlist rewriting ──────────────────────────────────
            # When the response is a playlist, we use sub_filter to rewrite
            # absolute segment URLs so they route back through this proxy.
            # This means the browser never contacts the CDN directly.
            location ~ /stream/.*\.m3u8 {
                proxy_pass $target_url;
                proxy_ssl_server_name on;
                proxy_set_header Host "";
                proxy_set_header Referer "https://h5.aoneroom.com";
                proxy_set_header Origin  "https://h5.aoneroom.com";
                proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";

                # Rewrite absolute CDN URLs in the playlist to go through /stream/
                sub_filter_types application/vnd.apple.mpegurl text/plain;
                sub_filter_once  off;
                # Rewrite https:// segment URLs → /stream/https://...
                sub_filter 'https://' '/stream/https://';

                proxy_connect_timeout 10s;
                proxy_read_timeout    60s;
            }

            # ── Video segments (.ts, .mp4, .m4s) ────────────────────────
            # Stream directly — no body rewriting needed, just header injection
            proxy_pass $target_url;
            proxy_ssl_server_name on;
            proxy_set_header Host "";
            proxy_set_header Referer "https://h5.aoneroom.com";
            proxy_set_header Origin  "https://h5.aoneroom.com";
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";

            # Pass Range headers through for seeking
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;

            # Don't buffer video — stream it straight to the client
            proxy_buffering          off;
            proxy_request_buffering  off;

            # Large timeouts for long video segments
            proxy_connect_timeout 10s;
            proxy_read_timeout    120s;
            proxy_send_timeout    120s;
        }

        # ====================================================================
        # Legacy catch-all — handles the old format: /https://target.com/...
        # Keeps backward compatibility with existing Netlify function calls
        # ====================================================================
        location / {
            # Only process if path starts with http
            if ($request_uri !~* "^/(https?://.+)$") {
                return 404;
            }

            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Range, Content-Type, Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

            # Handle preflight
            if ($request_method = 'OPTIONS') {
                return 204;
            }

            # Use Lua or a rewrite to extract the URL
            # For now, use a simple approach with proxy_pass and variables
            set $target_url '';
            
            # Extract URL from path using rewrite
            if ($request_uri ~* "^/(https?://.+)$") {
                set $target_url $1;
            }

            # Proxy to the extracted URL
            proxy_pass $target_url;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_set_header Host "";
            proxy_set_header Referer "https://h5.aoneroom.com";
            proxy_set_header Origin  "https://h5.aoneroom.com";
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
            proxy_set_header Range $http_range;

            # Rewrite m3u8 playlists on the fly
            sub_filter_types application/vnd.apple.mpegurl text/plain;
            sub_filter_once  off;
            sub_filter 'https://' '/https://';

            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_connect_timeout   10s;
            proxy_read_timeout      120s;
        }
    }
}
