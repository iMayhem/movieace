<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0a0a0c"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="statusGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff5a1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8a00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Status indicator circles -->
  <circle cx="32" cy="20" r="4" fill="#10b981">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="20" cy="38" r="4" fill="#f59e0b">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="44" cy="38" r="4" fill="#ef4444">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Center checkmark/status icon -->
  <path d="M 26 32 L 30 36 L 38 28" stroke="url(#statusGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Connecting lines -->
  <line x1="32" y1="24" x2="32" y2="28" stroke="url(#statusGradient)" stroke-width="1.5" opacity="0.3"/>
  <line x1="28" y1="32" x2="24" y2="36" stroke="url(#statusGradient)" stroke-width="1.5" opacity="0.3"/>
  <line x1="36" y1="32" x2="40" y2="36" stroke="url(#statusGradient)" stroke-width="1.5" opacity="0.3"/>
</svg>
