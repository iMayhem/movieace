<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Moovie</title>
    
    <!-- Performance Optimizations: Resource Hints -->
    <link rel="dns-prefetch" href="https://image.tmdb.org/t/p/" />
    <link rel="dns-prefetch" href="https://wsrv.nl" />
    <link rel="dns-prefetch" href="https://api.themoviedb.org" />
    <link rel="preconnect" href="https://image.tmdb.org/t/p/" crossorigin />
    <link rel="preconnect" href="https://wsrv.nl" crossorigin />
    
    <!-- Preload critical fonts (if any) -->
    <!-- <link rel="preload" href="/fonts/your-font.woff2" as="font" type="font/woff2" crossorigin /> -->
    
    <!-- Critical CSS - Inline minimal styles for faster FCP -->
    <style>
      /* Critical above-the-fold styles */
      *,*::before,*::after{box-sizing:border-box}*{margin:0}html{-webkit-text-size-adjust:100%;-moz-text-size-adjust:100%;text-size-adjust:100%;-webkit-tap-highlight-color:transparent}body{min-height:100vh;min-height:100dvh;background:#0b0a08;color:#f5efe4;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}#app{isolation:isolate}.app-stage{position:relative;min-height:100vh;min-height:100dvh;isolation:isolate}
    </style>
    
    <!-- Early Anti-Inspect Protection (runs before any other scripts) -->
    <script>
      (function() {
        'use strict';
        
        // Disable right-click immediately
        document.addEventListener('contextmenu', function(e) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }, true);
        
        // Disable key shortcuts immediately
        document.addEventListener('keydown', function(e) {
          // F12
          if (e.key === 'F12') {
            e.preventDefault();
            e.stopPropagation();
            return false;
          }
          
          var meta = e.ctrlKey || e.metaKey;
          if (!meta) return;
          
          var k = (e.key || '').toUpperCase();
          
          // Block DevTools shortcuts
          if (e.shiftKey && (k === 'I' || k === 'J' || k === 'C' || k === 'K' || k === 'M' || k === 'E')) {
            e.preventDefault();
            e.stopPropagation();
            return false;
          }
          
          // Block view source, save, print
          if (k === 'U' || k === 'S' || k === 'P') {
            e.preventDefault();
            e.stopPropagation();
            return false;
          }
          
          // Block Alt combinations
          if (e.altKey && (k === 'I' || k === 'J' || k === 'C')) {
            e.preventDefault();
            e.stopPropagation();
            return false;
          }
        }, true);
        
        // Disable text selection
        document.addEventListener('selectstart', function(e) {
          if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
            e.preventDefault();
            return false;
          }
        }, true);
        
        // Disable copy/cut/paste
        document.addEventListener('copy', function(e) {
          e.preventDefault();
          return false;
        }, true);
        
        document.addEventListener('cut', function(e) {
          e.preventDefault();
          return false;
        }, true);
        
        // Disable drag
        document.addEventListener('dragstart', function(e) {
          e.preventDefault();
          return false;
        }, true);
        
        // Detect DevTools via debugger trap
        setInterval(function() {
          var before = new Date().getTime();
          // eslint-disable-next-line no-debugger
          debugger;
          var after = new Date().getTime();
          if (after - before > 100) {
            // DevTools detected - redirect or show warning
            document.body.innerHTML = '<div style="position:fixed;inset:0;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;font-family:sans-serif;text-align:center;padding:20px;"><div><h1>⚠️ Developer Tools Detected</h1><p>Please close developer tools and refresh the page.</p></div></div>';
          }
        }, 1000);
        
        // Clear console periodically
        setInterval(function() {
          try {
            console.clear();
          } catch(e) {}
        }, 1000);
        
      })();
    </script>
    
    <script>
      (function () {
        try {
          var path = location.pathname;
          if (path.indexOf('/api/') === 0 || path.indexOf('/party') === 0 || /\.[a-z0-9]+$/i.test(path)) return;
          if (path === '/m' || path.indexOf('/m/') === 0) return;
          var q = location.search || '';
          if (/\bdesktop=1\b/.test(q) || q.indexOf('desktop') !== -1) return;
          var mobileQ = /\bmobile=1\b/.test(q) || q.indexOf('mobile') !== -1;
          var ua = navigator.userAgent || '';
          var mobileUa = /Android|webOS|iPhone|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(ua) || /iPad|Tablet/i.test(ua);
          var touch = 'ontouchstart' in window || (navigator.maxTouchPoints || 0) > 0;
          var narrow = window.matchMedia && window.matchMedia('(max-width: 1024px)').matches;
          var tablet = touch && narrow;
          if (mobileQ || mobileUa || tablet) {
            var target = path === '/' ? '/m' : '/m' + path;
            location.replace(target + location.search + location.hash);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
