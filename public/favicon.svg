<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Cute popcorn bucket -->
  <defs>
    <linearGradient id="bucketGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff5a1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8a00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Bucket body -->
  <path d="M18 28 L14 54 C14 56 15 58 17 58 L47 58 C49 58 50 56 50 54 L46 28 Z" 
        fill="url(#bucketGradient)" stroke="#d94a15" stroke-width="1.5"/>
  
  <!-- Stripes on bucket -->
  <path d="M20 32 L16 50 L48 50 L44 32" fill="none" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <path d="M22 38 L18 48 L46 48 L42 38" fill="none" stroke="#fff" stroke-width="1" opacity="0.3"/>
  
  <!-- Popcorn pieces -->
  <circle cx="24" cy="20" r="4" fill="#fff9e6" stroke="#f5e6c8" stroke-width="1"/>
  <circle cx="32" cy="16" r="5" fill="#fff9e6" stroke="#f5e6c8" stroke-width="1"/>
  <circle cx="40" cy="20" r="4" fill="#fff9e6" stroke="#f5e6c8" stroke-width="1"/>
  <circle cx="28" cy="24" r="3.5" fill="#fff9e6" stroke="#f5e6c8" stroke-width="1"/>
  <circle cx="36" cy="24" r="3.5" fill="#fff9e6" stroke="#f5e6c8" stroke-width="1"/>
  <circle cx="32" cy="10" r="4" fill="#fff9e6" stroke="#f5e6c8" stroke-width="1"/>
  <circle cx="26" cy="14" r="3" fill="#fff9e6" stroke="#f5e6c8" stroke-width="1"/>
  <circle cx="38" cy="14" r="3" fill="#fff9e6" stroke="#f5e6c8" stroke-width="1"/>
  
  <!-- Cute sparkles -->
  <circle cx="16" cy="18" r="1.5" fill="#ffcc00" opacity="0.8"/>
  <circle cx="48" cy="22" r="1.5" fill="#ffcc00" opacity="0.8"/>
  <circle cx="32" cy="6" r="1.5" fill="#ffcc00" opacity="0.8"/>
</svg>
